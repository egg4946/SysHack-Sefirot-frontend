openapi: 3.0.3
info:
  title: Sefirot Backend API
  version: 2.1.0
  description: 課題進捗共有サービス「Sefirot」のAPI仕様書（個人詳細・全体チャット機能追加版）
servers:
  - url: http://localhost:8000/api/v1
tags:
  - name: Auth
    description: 認証関係（登録・ログイン・トークン更新・ユーザー情報）
  - name: Community
    description: コミュニティの作成・参加・メンバー管理・表示名・個人詳細
  - name: Task
    description: タスクの追加・編集・進捗更新・状態更新・アサイン
  - name: Checklist
    description: タスク内チェックリストの管理
  - name: Chat
    description: プロジェクト全体のチャット（タイムライン）機能
security:
  - bearerAuth: []
paths:
  /auth/signup:
    post:
      summary: Sign up
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: Signup success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/signin:
    post:
      summary: Sign in
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SigninRequest"
      responses:
        "200":
          description: Signin success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/refresh:
    post:
      summary: Refresh access token
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
  /auth/logout:
    post:
      summary: Logout (revoke refresh token)
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Logged out
  /me:
    get:
      summary: Get my user data and communities
      tags:
        - Auth
      responses:
        "200":
          description: User data and communities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
  /community/create:
    post:
      summary: Create community
      tags:
        - Community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityCreateRequest"
      responses:
        "200":
          description: Created community
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityData"
  /community/join:
    post:
      summary: Join community
      tags:
        - Community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityJoinRequest"
      responses:
        "200":
          description: Joined community
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityData"
  /community/member/name:
    patch:
      summary: プロジェクト内での表示名を変更する
      tags:
        - Community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityMemberNameRequest"
      responses:
        "200":
          description: 表示名変更成功
  /community/invite:
    post:
      summary: 招待コードの発行
      tags:
        - Community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityInviteRequest"
      responses:
        "200":
          description: 招待コード発行成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityInviteResponse"
  /community/members:
    get:
      summary: コミュニティの参加メンバー一覧を取得
      tags:
        - Community
      parameters:
        - $ref: "#/components/parameters/CommunityIdQuery"
      responses:
        "200":
          description: メンバー一覧（プロジェクト内の表示名で返ります）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /community/member/detail:
    get:
      summary: メンバーの詳細情報（サマリーと担当タスク）を取得
      tags:
        - Community
      parameters:
        - $ref: "#/components/parameters/CommunityIdQuery"
        - name: user_id
          in: query
          required: true
          description: 詳細を見たいメンバーのユーザーID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: メンバー詳細データ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDetailResponse"
  /community/kick:
    post:
      summary: メンバーをコミュニティからキック（追放）する
      tags:
        - Community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityKickRequest"
      responses:
        "200":
          description: キック成功
  /tasks:
    get:
      summary: Get tasks in a community
      tags:
        - Task
      parameters:
        - $ref: "#/components/parameters/CommunityIdQuery"
        - $ref: "#/components/parameters/SortByQuery"
        - $ref: "#/components/parameters/OrderQuery"
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
  /tasks/create:
    post:
      summary: Create a new task
      tags:
        - Task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreateRequest"
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskData"
  /tasks/update:
    patch:
      summary: タスクの基本情報（名前、内容、優先度、期限）を編集する
      tags:
        - Task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdateRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskData"
  /tasks/progress:
    patch:
      summary: Update task progress
      tags:
        - Task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskProgressRequest"
      responses:
        "200":
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskData"
  /tasks/status:
    patch:
      summary: タスクの状態（未着手/進行中/完了）を更新
      tags:
        - Task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskData"
  /tasks/assign:
    post:
      summary: Assign user to a task
      tags:
        - Task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskAssignRequest"
      responses:
        "200":
          description: Assigned successfully
  /checklists/create:
    post:
      summary: Add a checklist item to a task
      tags:
        - Checklist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChecklistCreateRequest"
      responses:
        "200":
          description: Checklist item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistData"
  /checklists/update:
    patch:
      summary: Toggle checklist completion status
      tags:
        - Checklist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChecklistUpdateRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistData"
  /chat/messages:
    get:
      summary: プロジェクト全体のチャット履歴を取得
      tags:
        - Chat
      parameters:
        - $ref: "#/components/parameters/CommunityIdQuery"
      responses:
        "200":
          description: メッセージの一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessageData"
  /chat/send:
    post:
      summary: チャットにメッセージを送信
      tags:
        - Chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatSendRequest"
      responses:
        "200":
          description: 送信されたメッセージ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageData"

components:
  schemas:
    SignupRequest:
      type: object
      required:
        - email
        - password
        - display_name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        display_name:
          type: string
    SigninRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AuthResponse:
      type: object
      required:
        - user
        - access_token
      properties:
        user:
          $ref: "#/components/schemas/User"
        access_token:
          type: string
        refresh_token:
          type: string
    User:
      type: object
      required:
        - id
        - email
        - display_name
        - created_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        created_at:
          type: string
          format: date-time
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    RefreshResponse:
      type: object
      required:
        - access_token
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    CommunityData:
      type: object
      required:
        - id
        - name
        - invite_code
        - member_count
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: コミュニティ名
        invite_code:
          type: string
          description: 招待コード
        member_count:
          type: integer
          description: 参加人数
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
    CommunityCreateRequest:
      type: object
      required:
        - name
        - display_name
      properties:
        name:
          type: string
        display_name:
          type: string
          description: このプロジェクト内での自分の表示名
    CommunityJoinRequest:
      type: object
      required:
        - invite_code
        - display_name
      properties:
        invite_code:
          type: string
        display_name:
          type: string
          description: このプロジェクト内での自分の表示名
    CommunityMemberNameRequest:
      type: object
      required:
        - community_id
        - display_name
      properties:
        community_id:
          type: string
          format: uuid
        display_name:
          type: string
          description: 新しい表示名
    CommunityInviteRequest:
      type: object
      required:
        - community_id
      properties:
        community_id:
          type: string
          format: uuid
    CommunityInviteResponse:
      type: object
      required:
        - invite_code
      properties:
        invite_code:
          type: string
    CommunityKickRequest:
      type: object
      required:
        - community_id
        - user_id
      properties:
        community_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
    MeResponse:
      type: object
      required:
        - user_data
        - user_communities
      properties:
        user_data:
          $ref: "#/components/schemas/User"
        user_communities:
          type: array
          items:
            $ref: "#/components/schemas/CommunityData"
    MemberDetailResponse:
      type: object
      required:
        - user
        - summary
        - tasks
      properties:
        user:
          type: object
          required: [id, display_name, joined_at]
          properties:
            id:
              type: string
              format: uuid
            display_name:
              type: string
              description: プロジェクト内表示名
            joined_at:
              type: string
              format: date-time
              description: プロジェクト参加日
        summary:
          type: object
          required: [total_tasks, completed, in_progress, not_started]
          properties:
            total_tasks:
              type: integer
            completed:
              type: integer
            in_progress:
              type: integer
            not_started:
              type: integer
        tasks:
          type: array
          items:
            type: object
            required: [task_id, name, status, priority, personal_progress, overall_progress]
            properties:
              task_id:
                type: string
                format: uuid
              name:
                type: string
              status:
                type: string
              priority:
                type: string
              deadline:
                type: string
                format: date-time
                nullable: true
              personal_progress:
                type: integer
              overall_progress:
                type: integer
    TaskAssigneeData:
      type: object
      required:
        - id
        - email
        - display_name
        - progress
        - created_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
          description: プロジェクト内表示名
        progress:
          type: integer
          description: この人の個人進捗度
          minimum: 0
          maximum: 100
        created_at:
          type: string
          format: date-time
    TaskData:
      type: object
      required:
        - id
        - community_id
        - name
        - progress
        - priority
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        community_id:
          type: string
          format: uuid
        parent_task_id:
          type: string
          format: uuid
          nullable: true
          description: 子タスクの場合、親タスクのID
        name:
          type: string
        description:
          type: string
          nullable: true
          description: タスクの内容・詳細
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: メンバーの個人進捗の平均（自動計算）
        priority:
          type: string
          enum: [大, 中, 小]
        status:
          type: string
          enum: [未着手, 進行中, 完了]
          description: タスクの現在の状態
        deadline:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        assignees:
          type: array
          items:
            $ref: "#/components/schemas/TaskAssigneeData"
        checklists:
          type: array
          items:
            $ref: "#/components/schemas/ChecklistData"
    TaskListResponse:
      type: array
      items:
        $ref: "#/components/schemas/TaskData"
    TaskCreateRequest:
      type: object
      required:
        - community_id
        - name
        - priority
      properties:
        community_id:
          type: string
          format: uuid
        parent_task_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        priority:
          type: string
          enum: [大, 中, 小]
        status:
          type: string
          enum: [未着手, 進行中, 完了]
        deadline:
          type: string
          format: date-time
          nullable: true
    TaskUpdateRequest:
      type: object
      required:
        - task_id
      properties:
        task_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        priority:
          type: string
          enum: [大, 中, 小]
        deadline:
          type: string
          format: date-time
          nullable: true
    TaskProgressRequest:
      type: object
      required:
        - task_id
        - progress
      properties:
        task_id:
          type: string
          format: uuid
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: 自分の個人進捗を送信する
    TaskStatusRequest:
      type: object
      required:
        - task_id
        - status
      properties:
        task_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [未着手, 進行中, 完了]
    TaskAssignRequest:
      type: object
      required:
        - task_id
        - user_id
      properties:
        task_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
    ChecklistData:
      type: object
      required:
        - id
        - task_id
        - content
        - is_completed
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        content:
          type: string
        is_completed:
          type: boolean
    ChecklistCreateRequest:
      type: object
      required:
        - task_id
        - content
      properties:
        task_id:
          type: string
          format: uuid
        content:
          type: string
    ChecklistUpdateRequest:
      type: object
      required:
        - checklist_id
        - is_completed
      properties:
        checklist_id:
          type: string
          format: uuid
        is_completed:
          type: boolean
    ChatMessageData:
      type: object
      required:
        - id
        - community_id
        - user
        - content
        - created_at
      properties:
        id:
          type: string
          format: uuid
        community_id:
          type: string
          format: uuid
        user:
          type: object
          required: [id, display_name]
          properties:
            id:
              type: string
              format: uuid
            display_name:
              type: string
        content:
          type: string
        created_at:
          type: string
          format: date-time
    ChatSendRequest:
      type: object
      required:
        - community_id
        - content
      properties:
        community_id:
          type: string
          format: uuid
        content:
          type: string
  parameters:
    CommunityIdQuery:
      name: community_id
      in: query
      required: true
      description: 対象となるコミュニティのID
      schema:
        type: string
        format: uuid
    SortByQuery:
      name: sort_by
      in: query
      required: false
      description: 並び替え基準
      schema:
        type: string
        enum: [created_at, deadline, priority, progress]
        default: created_at
    OrderQuery:
      name: order
      in: query
      required: false
      description: 昇順/降順
      schema:
        type: string
        enum: [asc, desc]
        default: asc
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
